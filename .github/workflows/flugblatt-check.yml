name: Flugblatt Aktionen prüfen

on:
  schedule:
    - cron: '0 2 * * *'   # Täglich 02:00 Uhr nachts
  workflow_dispatch:        # Manuell auslösbar zum Testen

jobs:
  check-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 15    # Nur 15 Min nötig – kein PDF-Download mehr!

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Pakete installieren
        run: npm install
        working-directory: ./scripts

      - name: Aktionen prüfen und in Firebase speichern
        env:
          FIREBASE_DATABASE_URL: ${{ secrets.FIREBASE_DATABASE_URL }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node check-deals.js
        working-directory: ./scripts
